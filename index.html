<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快点实时地震监测系统</title>
    <meta name="keywords" content="地震,防灾,减灾,防災,日本,中国,速报,预警,四川,实时,最新,资讯,EEW,CEIV,強震モニタ" />
    <meta name="description" content="实时地震定点观测 地震预警 地震速报 最新中国/日本地震资讯" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'quake-red': '#dc2626',
                        'quake-orange': '#ea580c',
                        'quake-yellow': '#ca8a04',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        iframe {
            border: none;
            overflow: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        iframe::-webkit-scrollbar {
            display: none;
        }

        .panel {
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(156, 163, 175, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid rgba(75, 85, 99, 0.5);
        }

        .panel-content {
            flex: 1;
            min-height: 0;
        }

        @keyframes blink {
            0%, 100% { background-color: #22c55e; opacity: 1; }
            50% { background-color: #4ade80; opacity: 0.6; }
        }

        .status-blink {
            animation: blink 2s infinite;
        }

        /* Apple-style navigation */
        .nav-bar {
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-title {
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .nav-status {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
        }
    </style>
</head>

<body class="bg-gray-950 min-h-screen text-gray-100 select-none antialiased">
    
    <!-- 导航栏 -->
    <header class="nav-bar px-6 py-3 flex items-center justify-between shadow-md relative z-50">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-green-400 status-blink shadow-lg shadow-green-400/50"></div>
                <h1 class="nav-title text-white text-base">快点实时地震监测系统</h1>
            </div>
            
            <!-- 垂直分割线 -->
            <div class="hidden lg:block w-px h-4 bg-gray-700/60"></div>
            
            <!-- 常用链接导航 -->
            <nav class="hidden lg:flex items-center gap-5 text-xs text-gray-400 font-medium">
                <a href="https://baike.baidu.com/item/%E5%9C%B0%E9%9C%87/40588" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>📖</span> 地震百科
                </a>
                <a href="https://www.cenc.ac.cn/earthquake-manage-publish-web/" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>🇨🇳</span> 中国地震台网
                </a>
                <a href="https://www.data.jma.go.jp/multi/quake/index.html?lang=cn_zs" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>🇯🇵</span> 日本气象厅
                </a>
                <a href="https://earthquake.usgs.gov/earthquakes/map/" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>🇺🇸</span> USGS美国地质调查
                </a>
                <a href="https://wolfx.jp/apidoc_zh" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>🐺</span> Wolfx速报
                </a>
                <a href="https://img.ithome.com/newsuploadfiles/2024/8/099b7b7c-a750-4a45-89b8-035aa5c05f15.jpg" target="_blank" class="hover:text-white flex items-center gap-1.5 transition-colors duration-200">
                    <span>📸</span> 地震预警微信小程序
                </a>
            </nav>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="nav-status text-gray-300 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400 shadow-sm shadow-green-400/50"></span>
                <span class="font-medium tracking-wide text-[11px] uppercase">Live</span>
            </div>
            <span class="text-gray-400 font-mono text-sm tracking-wider" id="last-update">--:--:--</span>
        </div>
    </header>

    <!-- 主体内容区 -->
    <div class="relative flex h-[calc(100vh-53px)] overflow-hidden">
        
        <!-- 左侧地图主区域 -->
        <div class="flex-1 p-3">
            <iframe src="CEIV2-bousai/index.html" class="w-full h-full rounded-xl shadow-2xl border border-gray-800/40 bg-gray-900" title="实时震度地图"></iframe>
        </div>

        <!-- 左下角悬浮：最新地震面板 -->
        <div id="quake-panel"
            class="absolute left-6 bottom-6 w-80 h-[calc(40vh-80px)] bg-gray-900/90 backdrop-blur-md rounded-xl shadow-2xl border border-gray-700/40 overflow-hidden z-40 transition-all duration-300 hover:border-gray-600/50">
            <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-4 py-2.5 flex items-center gap-2 border-b border-gray-700/40">
                <span class="text-blue-400 text-sm">📊</span>
                <span class="text-xs font-bold tracking-wider text-gray-200">最新地震速报</span>
            </div>
            <iframe src="CENCEQList/index.html" class="w-full h-[calc(100%-38px)]" title="最新地震数据"></iframe>
        </div>

        <!-- 右侧侧边栏 -->
        <div class="w-[420px] p-3 pl-0 flex flex-col gap-3 overflow-hidden h-full">
            
            <!-- 日本气象厅地震情报 -->
            <div class="panel bg-gray-900/60 border border-gray-800/60 rounded-xl flex-1 min-h-0">
                <div class="panel-header flex items-center gap-2">
                    <span class="text-yellow-400 text-sm">📋</span>
                    <span class="text-xs font-bold tracking-wider text-gray-200">日本气象厅地震情报</span>
                </div>
                <div class="panel-content">
                    <iframe src="https://bs.wolfx.jp/newJMAEQList/index.html" class="w-full h-full rounded-b-xl" title="日本气象厅地震情报"></iframe>
                </div>
            </div>

            <!-- 实时直播 -->
            <div class="panel bg-gray-900/60 border border-gray-800/60 rounded-xl flex-1 min-h-0">
                <div class="panel-header flex items-center gap-2">
                    <span class="text-purple-400 text-sm">📡</span>
                    <span class="text-xs font-bold tracking-wider text-gray-200">实时地震观测直播</span>
                </div>
                <div class="panel-content">
                    <iframe frameborder="0" class="w-full h-full rounded-b-xl"
                        src="https://www.bilibili.com/blackboard/live/live-activity-player.html?cid=22863790&quality=0"></iframe>
                </div>
            </div>

            <!-- 震动监测 -->
            <div class="panel bg-gray-900/60 border border-gray-800/60 rounded-xl flex-1 min-h-0">
                <div class="panel-header flex items-center gap-2">
                    <span class="text-orange-400 text-sm">⚡</span>
                    <span class="text-xs font-bold tracking-wider text-gray-200">地震震动监测</span>
                </div>
                <div class="panel-content">
                    <iframe src="https://dataview.raspberryshake.org/#/AM/REC8D/00/EHZ" class="w-full h-full rounded-b-xl" title="震动监测"></iframe>
                </div>
            </div>
            
        </div>
    </div>

    <!-- 时钟脚本 -->
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent =
                now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>

</html>
